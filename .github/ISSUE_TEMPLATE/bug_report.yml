name: Bug report
description: Report a problem with a published Codex Plugin package.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the incorrect behavior and what you expected instead.
    validations:
      required: true
  - type: input
    id: plugin
    attributes:
      label: Plugin
      placeholder: nxuskit
    validations:
      required: true
  - type: input
    id: codex-version
    attributes:
      label: Codex version
      placeholder: codex --version
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: List the smallest steps that reproduce the problem. Do not include secrets.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant output
      description: Paste only non-sensitive output.
      render: text
